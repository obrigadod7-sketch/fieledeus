services:
  # Backend Service
  - type: web
    name: watizat-backend
    runtime: python
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: watizat_db
      - key: JWT_SECRET
        generateValue: true
      - key: EMERGENT_LLM_KEY
        value: sk-emergent-b8cEdA5822d14C0638
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api
    numInstances: 1
    maxInstanceCount: 1

  # Frontend Service
  - type: web
    name: watizat-frontend
    runtime: node
    env: node
    buildCommand: cd frontend && yarn install --frozen-lockfile && GENERATE_SOURCEMAP=false yarn build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /api/*
        destination: https://watizat-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: watizat-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: GENERATE_SOURCEMAP
        value: "false"
      - key: CI
        value: "false"
    numInstances: 1
    maxInstanceCount: 1
